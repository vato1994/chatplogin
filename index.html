<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Arya Client Multi ID KeepAlive</title>
<style>
  :root{
    --bg:#0f1115;--panel:#16181f;--panel2:#1b1f28;--panel3:#242b38;--line:#2a3140;
    --text:#f5f7fb;--muted:#a0adbf;--blue:dodgerblue;--blue2:#1e78ff;--green:#22c55e;--amber:orange;--red:#ef4444;
    --bubble:#1a1f29;--bubbleMine:#1f2840;--shadow:0 14px 40px rgba(0,0,0,.28);--accentGrad:linear-gradient(to right, orange, dodgerblue);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:linear-gradient(180deg,#111318 0%,#141922 100%);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);overflow:hidden}
  button,input,textarea,select{font:inherit}
  a{color:#7db7ff}
  .app{height:100svh;display:flex;flex-direction:column}
  .hidden{display:none!important}
  .screen{display:none;flex-direction:column;min-height:0;flex:1}
  .screen.active{display:flex}
  .topbar{padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;border-bottom:1px solid var(--line);background:rgba(10,15,21,.95);backdrop-filter:blur(16px);display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);position:relative;z-index:20}
  .title{font-weight:800;font-size:17px;letter-spacing:.2px}
  .grow{flex:1}
  .icon-btn,.pill-btn,.small-btn,.send-btn,.room-chip{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;cursor:pointer}
  .icon-btn{width:40px;height:40px;display:grid;place-items:center;font-size:20px;flex:0 0 auto}
  .small-btn{padding:8px 10px;font-size:12px;white-space:nowrap}
  .pill-btn{padding:10px 12px;font-weight:700;white-space:nowrap}
  .field{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:16px;padding:13px 14px;outline:none}
  .field::placeholder,textarea::placeholder{color:#7c8aa0}
  .login-wrap{flex:1;display:grid;place-items:center;padding:18px}
  .login-card{width:min(100%,420px);background:rgba(16,24,36,.96);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
  .brand{font-size:28px;font-weight:900;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;line-height:1.4;margin-bottom:14px}
  .stack{display:flex;flex-direction:column;gap:10px}
  .btn-primary{width:100%;padding:13px 14px;border:none;border-radius:16px;background:var(--accentGrad);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 10px 25px rgba(30,144,255,.25)}
  .status{display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;border:1px solid var(--line);background:#121b28;font-size:12px;font-weight:700;white-space:nowrap}
  .dot{width:10px;height:10px;border-radius:50%}.red{background:var(--red)}.amber{background:var(--amber)}.green{background:var(--green)}
  .lobby-head{padding:12px;border-bottom:1px solid var(--line);background:rgba(10,15,21,.92)}
  .join-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;gap:8px}.row>*{flex:1;min-width:0}.row button{flex:0 0 auto}
  .lobby-body{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:8px}
  .joined-strip{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.joined-strip::-webkit-scrollbar{display:none}
  .room-chip{padding:10px 12px;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;flex:0 0 auto}
  .badge{min-width:18px;height:18px;padding:0 6px;border-radius:999px;display:grid;place-items:center;background:#d946ef;color:#fff;font-size:11px}
  .room-list{display:flex;flex-direction:column;gap:8px}
  .room-item{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:12px;cursor:pointer}
  .room-item:active{transform:scale(.995)}
  .room-name{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta{color:var(--muted);font-size:12px}
  .room-top{display:flex;justify-content:space-between;gap:10px;align-items:center}
  .chat-header{padding:calc(env(safe-area-inset-top) + 10px) 10px 10px;border-bottom:1px solid var(--line);background:rgba(10,15,21,.95);backdrop-filter:blur(16px);display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);position:relative;z-index:15}
  .chat-head-meta{min-width:0}.chat-room-title{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-room-sub{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .messages{flex:1;min-height:0;overflow:auto;padding:10px 10px 16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
  .empty{margin:auto;text-align:center;color:var(--muted);padding:24px}
  .msg{display:flex;gap:10px;align-items:flex-start;background:var(--bubble);border:1px solid var(--line);border-radius:18px;padding:10px;box-shadow:var(--shadow)}
  .msg.mine{background:var(--bubbleMine)}
  .avatar-wrap{width:42px;height:42px;flex:0 0 42px}.avatar,.avatar-gif{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid var(--line);background:#0f1621}.avatar-fallback{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#0f1621;border:1px solid var(--line)}
  .msg-main{min-width:0;flex:1}.msg-head{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:6px}.uname{font-weight:800}.uid-chip,.meta-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;background:#0f1723;border:1px solid var(--line);color:var(--muted);font-size:11px}.uid-chip{cursor:pointer}
  .msg-text{white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;line-height:1.43;font-size:14px}
  .media,.gif-media{display:block;width:min(100%,320px);max-height:320px;object-fit:contain;border-radius:14px;margin-top:8px;border:1px solid var(--line);background:#0c121a}
  .msg-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .composer{border-top:1px solid var(--line);background:rgba(10,15,21,.97);backdrop-filter:blur(16px);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-rows:auto auto auto auto;gap:6px}
  .room-tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.room-tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--text);display:inline-flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap}.tab.active{background:var(--accentGrad);border-color:#4c6ea0;color:#fff}
  .mode-strip{display:flex;gap:6px;overflow:auto}.mode-strip::-webkit-scrollbar{display:none}.mode-btn{padding:7px 9px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap}.mode-btn.active{background:var(--accentGrad);border-color:#4c6ea0;color:#fff}
  .target-row{display:flex;gap:6px}.target-row>*{flex:1;min-width:0}
  .compose-wrap{position:relative}textarea.field{min-height:48px;max-height:84px;resize:none;padding:12px 86px 12px 12px;line-height:1.25}.send-btn{position:absolute;right:7px;bottom:7px;width:32px;height:32px;display:grid;place-items:center;border-radius:50%;background:var(--accentGrad);color:#fff;box-shadow:0 8px 18px rgba(30,144,255,.22)}
  .emoji-btn{position:absolute;right:45px;bottom:7px;width:32px;height:32px;display:grid;place-items:center;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--text);cursor:pointer}
  .emoji-panel{position:absolute;left:0;right:0;bottom:54px;background:#131823;border:1px solid var(--line);border-radius:18px;padding:10px;display:none;grid-template-columns:repeat(8,minmax(0,1fr));gap:8px;box-shadow:var(--shadow)}
  .emoji-panel.show{display:grid}.emoji-chip{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:8px 0;text-align:center;cursor:pointer;font-size:20px}
  .user-card-main{min-width:0;flex:1}.user-subrow{display:flex;justify-content:space-between;gap:10px;align-items:center}.role-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.22);color:#ffd38a;font-size:11px}
  .users-sheet{position:fixed;inset:0;background:rgba(0,0,0,.54);display:none;z-index:60}.users-sheet.show{display:block}.users-panel{position:absolute;inset:auto 0 0 0;background:#0f1722;border-top-left-radius:22px;border-top-right-radius:22px;border-top:1px solid var(--line);height:min(76svh,640px);display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .users-head{padding:12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}.users-body{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .user-item{background:linear-gradient(180deg,#171c24 0%,#131923 100%);border:1px solid var(--line);border-radius:18px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
  .muted{color:var(--muted)}
  @media (max-width:520px){
    .topbar,.chat-header{gap:6px} .small-btn{padding:8px 9px} .account-select{max-width:120px}
    .target-row{display:grid;grid-template-columns:1fr 1fr} #targetUserId{grid-column:1 / -1}
  }
</style>
</head>
<body>
<div class="app">
  <section id="loginScreen" class="screen active">
    <div class="topbar"><div class="title">Arya Client</div><div class="grow"></div><div id="statusPill" class="status"><span class="dot red"></span>Offline</div></div>
    <div class="login-wrap">
      <div class="login-card">
        <div class="brand">Arya Client</div>
        <div class="sub">howdies 2.0 • Multi ID toggle version • KeepAlive/Reconnect</div>
        <div class="stack">
          <input id="username" class="field" placeholder="Username" />
          <input id="password" type="password" class="field" placeholder="Password" />
          <button id="loginBtn" class="btn-primary">Login All IDs</button>
        </div>
      </div>
    </div>
  </section>

  <section id="lobbyScreen" class="screen">
    <div class="topbar">
      <div class="title">Rooms</div>
      <div class="grow"></div>
      <button id="refreshRoomsBtn" class="small-btn">Refresh</button>
      <button id="disconnectBtn" class="icon-btn">⎋</button>
    </div>
    <div class="lobby-head">
      <div class="join-card">
        <div class="row">
          <input id="roomId" class="field" placeholder="Join by room ID" />
          <button id="joinByIdBtn" class="pill-btn">Join</button>
        </div>
        <div class="row">
          <input id="roomName" class="field" placeholder="Join by room name" />
          <button id="joinByNameBtn" class="pill-btn">Join</button>
        </div>
        <input id="roomSearch" class="field" placeholder="Search room directory" />
        <div id="roomsHint" class="muted" style="font-size:12px">Room directory will appear here after login.</div>
      </div>
    </div>
    <div class="lobby-body">
      <div>
        <div class="section-title">Joined rooms</div>
        <div id="joinedRooms" class="joined-strip"></div>
      </div>
      <div>
        <div class="section-title">Room directory</div>
        <div id="roomDirectory" class="room-list"></div>
      </div>
    </div>
  </section>

  <section id="chatScreen" class="screen">
    <div class="chat-header">
      <button id="backToLobbyBtn" class="icon-btn">←</button>
      <div class="chat-head-meta">
        <div id="chatRoomTitle" class="chat-room-title">No room selected</div>
        <div id="chatRoomMeta" class="chat-room-sub">Open a room from the room list</div>
      </div>
      <div class="grow"></div>
      <button id="usersBtn" class="small-btn">Users</button>
      <button id="leaveBtn" class="small-btn">Leave</button>
    </div>
    <div id="messages" class="messages"></div>
    <div class="composer">
      <div class="room-tabs" id="roomTabs"></div>
      <div class="mode-strip">
        <button id="modeNormal" class="mode-btn active">Normal</button>
        <button id="modeSecret" class="mode-btn">Secret</button>
        <button id="modePm" class="mode-btn">PM</button>
        <button id="addRoomBtn" class="mode-btn">＋ Room</button>
      </div>
      <div class="target-row">
        <input id="targetUserId" class="field" placeholder="Secret user ID" />
        <input id="pmUser" class="field" placeholder="PM username" />
        <input id="pmUserId" class="field" placeholder="PM user ID" />
      </div>
      <div class="compose-wrap">
        <div id="emojiPanel" class="emoji-panel"></div>
        <textarea id="messageInput" class="field" placeholder="Type your message"></textarea>
        <button id="emojiBtn" class="emoji-btn">😊</button>
        <button id="sendBtn" class="send-btn">➤</button>
      </div>
    </div>
  </section>
</div>

<div id="usersSheet" class="users-sheet">
  <div class="users-panel">
    <div class="users-head">
      <button id="closeUsersBtn" class="icon-btn">←</button>
      <div>
        <div id="usersTitle" class="title" style="font-size:15px">Room users</div>
        <div id="usersMeta" class="meta">Current room</div>
      </div>
      <div class="grow"></div>
      <button id="refreshUsersBtn" class="small-btn">Refresh</button>
    </div>
    <div id="usersList" class="users-body"></div>
  </div>
</div>

<script>
(() => {
  const WS_URL = 'wss://app.howdies.app/howdies/';
  const IMAGE_RE = /(https?:\/\/\S+?(?:\.png|\.jpg|\.jpeg|\.gif|\.webp|\.bmp))(?!\S)/i;
  const URL_RE = /(https?:\/\/\S+)/ig;

  // KeepAlive settings. Browser cannot send real WebSocket ping frames.
  // This sends app-level JSON ping/pong and reconnects if no server packet is seen.
  const HEARTBEAT_MS = 20000;
  const STALE_AFTER_MS = 75000;
  const ROOM_REFRESH_EVERY_HEARTBEATS = 3;

  const app = { accounts: new Map(), activeKey: null, wakeLock: null };

  const $ = id => document.getElementById(id);
  const els = {
    loginScreen: $('loginScreen'), lobbyScreen: $('lobbyScreen'), chatScreen: $('chatScreen'),
    statusPill: $('statusPill'), username: $('username'), password: $('password'), loginBtn: $('loginBtn'), disconnectBtn: $('disconnectBtn'),
    roomId: $('roomId'), roomName: $('roomName'), joinByIdBtn: $('joinByIdBtn'), joinByNameBtn: $('joinByNameBtn'), refreshRoomsBtn: $('refreshRoomsBtn'), roomSearch: $('roomSearch'), roomsHint: $('roomsHint'), joinedRooms: $('joinedRooms'), roomDirectory: $('roomDirectory'),
    backToLobbyBtn: $('backToLobbyBtn'), chatRoomTitle: $('chatRoomTitle'), chatRoomMeta: $('chatRoomMeta'), usersBtn: $('usersBtn'), leaveBtn: $('leaveBtn'),
    messages: $('messages'), roomTabs: $('roomTabs'),
    modeNormal: $('modeNormal'), modeSecret: $('modeSecret'), modePm: $('modePm'), addRoomBtn: $('addRoomBtn'),
    targetUserId: $('targetUserId'), pmUser: $('pmUser'), pmUserId: $('pmUserId'), messageInput: $('messageInput'), emojiBtn: $('emojiBtn'), emojiPanel: $('emojiPanel'), sendBtn: $('sendBtn'),
    usersSheet: $('usersSheet'), closeUsersBtn: $('closeUsersBtn'), refreshUsersBtn: $('refreshUsersBtn'), usersTitle: $('usersTitle'), usersMeta: $('usersMeta'), usersList: $('usersList'),
  };

  function keyOf(username) { return String(username || '').trim().toLowerCase(); }
  function activeState() { return app.accounts.get(app.activeKey) || [...app.accounts.values()][0] || null; }
  function makeAccount(username, password) {
    return {
      key: keyOf(username),
      ws: null,
      connected: false,
      loggedIn: false,
      desiredOnline: false,
      reconnectTimer: null,
      reconnectDelay: 1000,
      heartbeatTimer: null,
      heartbeatCount: 0,
      lastSeen: Date.now(),
      lastConnectTry: 0,
      username: String(username || '').trim(),
      password,
      myName: String(username || '').trim(),
      roomList: [],
      roomListStamp: 0,
      roomTimer: null,
      rooms: new Map(),
      activeRoomId: null,
      sendMode: 'normal',
      lastUid: null,
      lastUidAt: 0,
      statusText: 'Offline',
    };
  }

  function injectMultiIdUi() {
    const style = document.createElement('style');
    style.textContent = `
      .account-select{max-width:150px;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:9px 10px;outline:none;font-weight:800}
      .account-select option{background:#111827;color:#fff}
      .multi-hint{font-size:12px;color:var(--muted);margin-top:-3px;line-height:1.35}
    `;
    document.head.appendChild(style);

    els.username.placeholder = 'Username(s): sher, checkbot, song';
    const hint = document.createElement('div');
    hint.className = 'multi-hint';
    hint.textContent = 'Multiple IDs ke liye comma/space se usernames daalo. Password same use hoga. KeepAlive + auto reconnect included.';
    els.username.insertAdjacentElement('afterend', hint);

    const lobbySel = document.createElement('select');
    lobbySel.id = 'accountSelectLobby';
    lobbySel.className = 'account-select hidden';
    lobbySel.title = 'Active ID';
    els.refreshRoomsBtn.before(lobbySel);

    const chatSel = document.createElement('select');
    chatSel.id = 'accountSelectChat';
    chatSel.className = 'account-select hidden';
    chatSel.title = 'Active ID';
    els.usersBtn.before(chatSel);

    els.accountSelectLobby = lobbySel;
    els.accountSelectChat = chatSel;
    [lobbySel, chatSel].forEach(sel => sel.addEventListener('change', () => switchAccount(sel.value, true)));
  }

  function showScreen(name) {
    ['loginScreen','lobbyScreen','chatScreen'].forEach(id => els[id].classList.remove('active'));
    els[name].classList.add('active');
  }

  function setStatus(kind, text) {
    const cls = kind === 'ready' ? 'green' : kind === 'connected' ? 'amber' : 'red';
    els.statusPill.innerHTML = `<span class="dot ${cls}"></span>${escapeHtml(text)}`;
  }

  function syncStatus() {
    const st = activeState();
    if (!st) return setStatus('offline','Offline');
    const online = [...app.accounts.values()].filter(a => a.loggedIn).length;
    const total = app.accounts.size || 1;
    if (st.loggedIn) setStatus('ready', `${st.username} Online (${online}/${total})`);
    else if (st.connected || st.desiredOnline) setStatus('connected', `${st.username} Connecting (${online}/${total})`);
    else setStatus('offline', `${st.username} Offline (${online}/${total})`);
  }

  function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function linkify(s) { return s.replace(URL_RE, u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`); }
  function wsSend(st, obj) {
    if (!st?.ws || st.ws.readyState !== WebSocket.OPEN) return false;
    try { st.ws.send(typeof obj === 'string' ? obj : JSON.stringify(obj)); return true; } catch { return false; }
  }
  function currentRoom() { const st = activeState(); return st?.rooms.get(st.activeRoomId) || null; }
  function normalizeRoomName(x) { return String(x || '').toLowerCase().replace(/\s+/g,' ').trim(); }

  function parseUsernames(raw) {
    const seen = new Set();
    return String(raw || '')
      .split(/[\s,;]+/)
      .map(x => x.trim())
      .filter(Boolean)
      .filter(x => { const k = keyOf(x); if (seen.has(k)) return false; seen.add(k); return true; });
  }

  function connectAndLogin() {
    const names = parseUsernames(els.username.value);
    const password = els.password.value;
    if (!names.length || !password) return alert('Please enter username(s) and password.');

    for (const old of app.accounts.values()) {
      old.desiredOnline = false;
      stopHeartbeat(old);
      stopRoomAutoRefresh(old);
      if (old.reconnectTimer) clearTimeout(old.reconnectTimer);
      try { old.ws?.close(); } catch {}
    }
    app.accounts.clear();
    app.activeKey = null;

    names.forEach((name, i) => {
      const acc = makeAccount(name, password);
      acc.desiredOnline = true;
      app.accounts.set(acc.key, acc);
      if (i === 0) app.activeKey = acc.key;
    });
    updateAccountSelectors();
    syncStatus();
    setStatus('connected', `Connecting ${names.length} ID${names.length > 1 ? 's' : ''}`);
    requestWakeLock();

    names.forEach((name, i) => {
      setTimeout(() => {
        const acc = app.accounts.get(keyOf(name));
        if (acc) connectAccount(acc);
      }, i * 350);
    });
  }

  function connectAccount(st) {
    if (!st?.desiredOnline) return;

    if (st.reconnectTimer) {
      clearTimeout(st.reconnectTimer);
      st.reconnectTimer = null;
    }

    stopHeartbeat(st);

    if (st.ws) {
      try {
        st.ws.onopen = null;
        st.ws.onmessage = null;
        st.ws.onerror = null;
        st.ws.onclose = null;
        st.ws.close();
      } catch {}
    }

    st.connected = false;
    st.loggedIn = false;
    st.statusText = 'Connecting';
    st.lastConnectTry = Date.now();
    syncStatus();

    const ws = new WebSocket(WS_URL);
    st.ws = ws;

    ws.onopen = () => {
      if (app.accounts.get(st.key) !== st || st.ws !== ws) return;
      st.connected = true;
      st.statusText = 'Authorizing';
      st.lastSeen = Date.now();
      st.reconnectDelay = 1000;
      startHeartbeat(st);
      syncStatus();
      wsSend(st, {
        handler:'loginnew', username:st.username, password:st.password, fcmt:`html-mobile-client-${st.username}`, lp:true, loginType:'H',
        devData:{
          uniqueID:`HTML-${st.username}-${Math.floor(Math.random()*9000+1000)}`,
          manufacturer:'browser', buildNumber:'237', apiLevel:-1, language:'en', model:'HTML', brand:'browser',
          instanceID:`html-${st.username}`, isEmulator:false, isLowRamDevice:false, OS:navigator.platform || 'browser'
        }
      });
    };
    ws.onmessage = ev => {
      if (app.accounts.get(st.key) !== st || st.ws !== ws) return;
      handlePacket(st, ev.data);
    };
    ws.onerror = () => {
      if (app.accounts.get(st.key) !== st || st.ws !== ws) return;
      st.statusText = 'WebSocket error';
      if (app.activeKey === st.key) setStatus('offline', `${st.username} WebSocket error`);
      if (st.desiredOnline) scheduleReconnect(st, 'socket error');
    };
    ws.onclose = () => {
      if (app.accounts.get(st.key) !== st || st.ws !== ws) return;

      st.connected = false;
      st.loggedIn = false;
      st.statusText = 'Offline';
      stopHeartbeat(st);
      stopRoomAutoRefresh(st);
      updateAccountSelectors();

      if (app.activeKey === st.key) {
        syncStatus();
        renderAll();
      }

      if (st.desiredOnline) {
        scheduleReconnect(st, 'socket closed');
        return;
      }

      const anyOnlineOrConnecting = [...app.accounts.values()].some(a => a.connected || a.loggedIn || a.ws?.readyState === WebSocket.CONNECTING);
      if (!anyOnlineOrConnecting && (els.chatScreen.classList.contains('active') || els.lobbyScreen.classList.contains('active'))) showScreen('loginScreen');
    };
  }

  function stopHeartbeat(st) {
    if (st?.heartbeatTimer) clearInterval(st.heartbeatTimer);
    if (st) st.heartbeatTimer = null;
  }

  function startHeartbeat(st) {
    stopHeartbeat(st);
    st.heartbeatCount = 0;
    st.lastSeen = Date.now();

    st.heartbeatTimer = setInterval(() => {
      if (!st.desiredOnline) return stopHeartbeat(st);

      if (!st.ws || st.ws.readyState !== WebSocket.OPEN) {
        scheduleReconnect(st, 'ws not open');
        return;
      }

      st.heartbeatCount += 1;

      // App-level ping. If server supports ping/pong, it may reply with pong.
      wsSend(st, { handler:'ping', t:Date.now(), client:'arya-html' });

      // Fallback keep-alive using a known lightweight request every 60 seconds.
      if (st.loggedIn && st.heartbeatCount % ROOM_REFRESH_EVERY_HEARTBEATS === 0) {
        wsSend(st, { handler:'getchatrooms', admin:String(st.username || st.myName || '') });
      }

      if (Date.now() - st.lastSeen > STALE_AFTER_MS) {
        try { st.ws.close(); } catch {}
        scheduleReconnect(st, 'heartbeat timeout');
      }
    }, HEARTBEAT_MS);
  }

  function scheduleReconnect(st, reason = '') {
    if (!st?.desiredOnline) return;
    if (st.reconnectTimer) return;

    stopHeartbeat(st);
    stopRoomAutoRefresh(st);

    const delay = Math.min(st.reconnectDelay || 1000, 30000);
    st.statusText = 'Reconnecting';
    updateAccountSelectors();

    if (app.activeKey === st.key) {
      setStatus('connected', `${st.username} reconnecting...`);
    }

    st.reconnectTimer = setTimeout(() => {
      st.reconnectTimer = null;
      if (!st.desiredOnline) return;
      st.reconnectDelay = Math.min(Math.floor(delay * 1.7), 30000);
      connectAccount(st);
    }, delay);
  }

  function rejoinOldRooms(st) {
    const roomIds = [...st.rooms.keys()].filter(rid => Number(rid) > 0);
    roomIds.forEach((rid, i) => {
      setTimeout(() => {
        if (st.loggedIn && st.ws?.readyState === WebSocket.OPEN) {
          wsSend(st, { handler:'joinchatroom', roomid:Number(rid) });
        }
      }, i * 700);
    });
  }

  async function requestWakeLock() {
    // Helps while app is visible/open. It cannot force Android/iOS to run JS forever in background.
    if (!('wakeLock' in navigator) || document.visibilityState !== 'visible') return;
    try {
      if (app.wakeLock) return;
      app.wakeLock = await navigator.wakeLock.request('screen');
      app.wakeLock.addEventListener('release', () => { app.wakeLock = null; });
    } catch {}
  }

  function updateAccountSelectors() {
    const selectors = [els.accountSelectLobby, els.accountSelectChat].filter(Boolean);
    selectors.forEach(sel => {
      sel.innerHTML = '';
      for (const a of app.accounts.values()) {
        const opt = document.createElement('option');
        opt.value = a.key;
        opt.textContent = `${a.loggedIn ? '🟢' : a.connected || a.desiredOnline ? '🟠' : '🔴'} ${a.username}`;
        sel.appendChild(opt);
      }
      sel.value = app.activeKey || '';
      sel.classList.toggle('hidden', app.accounts.size <= 1);
    });
  }

  function switchAccount(key, keepScreen = true) {
    if (!app.accounts.has(key)) return;
    app.activeKey = key;
    updateAccountSelectors();
    syncStatus();
    renderAll();
    const st = activeState();
    if (keepScreen && els.chatScreen.classList.contains('active') && !st?.activeRoomId) showScreen('lobbyScreen');
  }

  function renderAll() {
    renderJoinedRooms();
    renderRoomDirectory();
    renderTabs();
    renderMessages();
    renderUsers();
    updateChatHeader();
  }

  function unwrapPacket(obj) {
    if (!obj || typeof obj !== 'object') return obj;
    if (obj.data && typeof obj.data === 'object' && !Array.isArray(obj.data) && (obj.data.handler || obj.data.type)) {
      const inner = { ...obj.data };
      if (obj.roomid != null && inner.roomid == null) inner.roomid = obj.roomid;
      if (obj.roomId != null && inner.roomId == null) inner.roomId = obj.roomId;
      if (obj.error != null && inner.error == null) inner.error = obj.error;
      if (obj.status != null && inner.status == null) inner.status = obj.status;
      return inner;
    }
    return obj;
  }

  function handlePacket(st, raw) {
    st.lastSeen = Date.now();

    const rawText = String(raw ?? '').trim();
    if (/^ping$/i.test(rawText)) { wsSend(st, 'pong'); return; }
    if (/^pong$/i.test(rawText)) { return; }

    let msg;
    try { msg = unwrapPacket(JSON.parse(rawText)); } catch { return; }

    st.lastSeen = Date.now();

    const h0 = String(msg.handler || msg.type || '').toLowerCase();
    if (h0 === 'ping' || h0 === 'heartbeat' || h0 === 'keepalive') {
      wsSend(st, { handler:'pong', t:msg.t || msg.time || Date.now(), client:'arya-html' });
      return;
    }
    if (h0 === 'pong') return;

    const handler = msg.handler || msg.type || '';
    const blob = JSON.stringify(msg).toLowerCase();

    if (!st.loggedIn && (msg.status === 'success' || msg.error === 0) && /login/.test(blob)) onLoginSuccess(st);
    if (['loginnew','loginnewsuccess','login'].includes(handler) && (/success/.test(blob) || msg.error === 0)) onLoginSuccess(st);

    if (['getchatrooms','rooms','listRoom','Global'].includes(handler)) {
      const rooms = extractRooms(msg);
      if (rooms.length) {
        st.roomList = rooms;
        st.roomListStamp = Date.now();
        if (app.activeKey === st.key) {
          els.roomsHint.textContent = `${rooms.length} rooms loaded for ${st.username}`;
          renderRoomDirectory();
        }
      }
    }

    if (handler === 'joinchatroom' && (msg.error === 0 || msg.roomid || msg.roomId)) {
      const rid = Number(msg.roomid || msg.roomId || 0);
      const name = msg.name || roomNameById(st, rid) || `Room ${rid}`;
      ensureRoom(st, rid, name);
      st.activeRoomId = rid;
      if (app.activeKey === st.key) {
        activateRoom(rid, true);
        refreshUsers(st);
        syncStatus();
      }
    }

    if (handler === 'leavechatroom' && (msg.error === 0 || msg.roomid || msg.roomId)) {
      const rid = Number(msg.roomid || msg.roomId || 0);
      if (st.rooms.has(rid)) removeRoom(st, rid);
    }

    if (handler === 'getusers' || handler === 'activeoccupants') {
      const rid = Number(msg.roomid || msg.roomId || st.activeRoomId || 0);
      const users = extractUsers(msg);
      if (rid && st.rooms.has(rid)) {
        st.rooms.get(rid).users = users;
        if (app.activeKey === st.key) { renderUsers(); updateChatHeader(); }
      }
    }

    if (handler === 'userjoin' || handler === 'userleft') {
      if (app.activeKey === st.key && st.activeRoomId) refreshUsers(st);
    }

    if (handler === 'chatroommessage' || handler === 'message') {
      const fallbackRid = handler === 'message' ? -1 : (st.activeRoomId || 0);
      const rid = Number(msg.roomid || msg.roomId || fallbackRid || 0) || fallbackRid || -1;
      ensureRoom(st, rid, roomNameById(st, rid) || (rid === -1 ? 'PM' : `Room ${rid}`));
      const room = st.rooms.get(rid);
      room.messages.push(normalizeMessage(st, msg));
      if (st.activeRoomId !== rid) room.unread = (room.unread || 0) + 1;
      if (app.activeKey === st.key) {
        renderJoinedRooms();
        renderTabs();
        if (st.activeRoomId === rid) renderMessages();
      }
    }
  }

  function onLoginSuccess(st) {
    const firstTime = !st.loggedIn;
    st.loggedIn = true;
    st.connected = true;
    st.myName = st.username;
    st.statusText = 'Online';
    st.lastSeen = Date.now();
    st.reconnectDelay = 1000;
    if (firstTime) {
      els.password.value = '';
      refreshRoomList(true, st);
      startRoomAutoRefresh(st);
      rejoinOldRooms(st);
    }
    updateAccountSelectors();
    if (!els.lobbyScreen.classList.contains('active') && !els.chatScreen.classList.contains('active')) showScreen('lobbyScreen');
    if (app.activeKey === st.key) { syncStatus(); renderAll(); }
  }

  function extractRooms(msg) {
    let data = msg?.data ?? msg?.rooms ?? msg?.list ?? msg?.result ?? msg?.chatrooms ?? msg?.Global ?? msg?.global ?? [];
    if (msg?.data && typeof msg.data === 'object' && !Array.isArray(msg.data)) data = msg.data.Global ?? msg.data.global ?? msg.data.rooms ?? msg.data.list ?? msg.data.data ?? data;
    if (!Array.isArray(data) && Array.isArray(msg?.data?.data)) data = msg.data.data;
    if (!Array.isArray(data) && Array.isArray(msg?.data?.rooms)) data = msg.data.rooms;
    if (!Array.isArray(data)) return [];
    const seen = new Set(), out = [];
    for (const r of data) {
      const roomid = Number(r?.roomid ?? r?.id ?? r?.roomId ?? 0);
      const name = String(r?.name ?? r?.room ?? r?.roomname ?? '').trim();
      if (!roomid || !name || seen.has(roomid)) continue;
      seen.add(roomid);
      out.push({ roomid, name, users: Number(r?.usercount ?? r?.users ?? r?.occupants ?? 0) });
    }
    return out.sort((a,b) => a.name.localeCompare(b.name));
  }

  function extractUsers(msg) {
    const arr = msg.users || msg.data?.users || msg.data || [];
    if (!Array.isArray(arr)) return [];
    return arr.map(u => ({ userid:Number(u.userid ?? u.userId ?? u.UserID ?? 0), username:String(u.username ?? u.Username ?? ''), avatar:u.avatar || u.Avatar || '', role:u.role || u.userRole || '' })).filter(Boolean);
  }

  function normalizeMessage(st, msg) {
    const text = msg.text ?? '';
    const url = msg.url ?? '';
    const avatar = msg.avatar || msg.Avatar || '';
    const media = url || (String(text).match(IMAGE_RE)?.[1] || '');
    return { username: msg.username || msg.Username || 'Unknown', userid: msg.userid ?? msg.UserID ?? msg.userId ?? 0, avatar, text, url, media, type: msg.type || 'text', secret: !!msg.secret, mine: String(msg.username || msg.Username || '').toLowerCase() === String(st.myName || '').toLowerCase(), ts: new Date() };
  }

  function ensureRoom(st, rid, name) { if (!st.rooms.has(rid)) st.rooms.set(rid, { roomid:rid, name, messages:[], users:[], unread:0 }); }
  function roomNameById(st, rid) { return st.roomList.find(r => Number(r.roomid) === Number(rid))?.name || st.rooms.get(rid)?.name || ''; }

  function activateRoom(rid, openChat = false) {
    const st = activeState();
    if (!st) return;
    st.activeRoomId = rid;
    const room = currentRoom();
    if (room) room.unread = 0;
    renderJoinedRooms(); renderTabs(); renderMessages(); renderUsers(); updateChatHeader();
    if (openChat) showScreen('chatScreen');
  }

  function removeRoom(st, rid) {
    st.rooms.delete(rid);
    if (st.activeRoomId === rid) st.activeRoomId = [...st.rooms.keys()][0] || null;
    if (app.activeKey === st.key) {
      renderJoinedRooms(); renderTabs(); renderMessages(); renderUsers(); updateChatHeader();
      if (!st.activeRoomId) showScreen('lobbyScreen');
    }
  }

  function avatarNode(url) {
    if (!url) {
      const fallback = document.createElement('div'); fallback.className = 'avatar-fallback'; fallback.textContent = '👤'; return fallback;
    }
    const img = document.createElement('img'); img.className = /\.gif(\?|$)/i.test(url) ? 'avatar-gif' : 'avatar'; img.src = url; img.loading='lazy'; img.onerror = () => img.replaceWith(Object.assign(document.createElement('div'), { className:'avatar-fallback', textContent:'👤' })); return img;
  }

  function mediaNode(url) {
    if (!url) return null;
    if (/\.(gif|png|jpg|jpeg|webp|bmp)(\?|$)/i.test(url)) {
      const img = document.createElement('img'); img.className = /\.gif(\?|$)/i.test(url) ? 'gif-media' : 'media'; img.src = url; img.loading='lazy'; return img;
    }
    const a = document.createElement('a'); a.href = url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = url; return a;
  }

  function renderJoinedRooms() {
    const st = activeState();
    if (!st) { els.joinedRooms.innerHTML = '<div class="muted" style="font-size:12px">No ID logged in.</div>'; return; }
    const items = [...st.rooms.values()];
    els.joinedRooms.innerHTML = items.length ? '' : `<div class="muted" style="font-size:12px">${escapeHtml(st.username)} ne abhi koi room join nahi kiya.</div>`;
    for (const r of items) {
      const el = document.createElement('button');
      el.className = 'room-chip';
      el.innerHTML = `<span>${escapeHtml(r.name)}</span>${r.unread ? `<span class="badge">${r.unread}</span>` : ''}`;
      el.onclick = () => activateRoom(r.roomid, true);
      els.joinedRooms.appendChild(el);
    }
  }

  function renderRoomDirectory() {
    const st = activeState();
    if (!st) { els.roomDirectory.innerHTML = '<div class="muted" style="font-size:12px">No ID logged in.</div>'; return; }
    const q = (els.roomSearch.value || '').trim().toLowerCase();
    const list = st.roomList.filter(r => !q || r.name.toLowerCase().includes(q) || String(r.roomid).includes(q)).slice(0, 200);
    els.roomDirectory.innerHTML = list.length ? '' : '<div class="muted" style="font-size:12px">Room list is empty.</div>';
    for (const r of list) {
      const el = document.createElement('div');
      el.className = 'room-item';
      el.innerHTML = `<div class="room-top"><div class="room-name">${escapeHtml(r.name)}</div><div class="meta">${r.users || 0} users</div></div><div class="meta">Room ID ${r.roomid}</div>`;
      el.onclick = () => { els.roomId.value = r.roomid; els.roomName.value = r.name; joinRoomId(r.roomid); };
      els.roomDirectory.appendChild(el);
    }
  }

  function renderTabs() {
    const st = activeState();
    const items = st ? [...st.rooms.values()] : [];
    els.roomTabs.innerHTML = '';
    for (const r of items) {
      const el = document.createElement('button');
      el.className = 'tab' + (st.activeRoomId === r.roomid ? ' active' : '');
      el.innerHTML = `<span>${escapeHtml(r.name)}</span>${r.unread ? `<span class="badge">${r.unread}</span>` : ''}`;
      el.onclick = () => activateRoom(r.roomid, true);
      els.roomTabs.appendChild(el);
    }
    if (!items.length) els.roomTabs.innerHTML = '<div class="tab active">No room yet</div>';
  }

  function renderUsers() {
    const st = activeState();
    const room = currentRoom();
    els.usersTitle.textContent = room ? `${room.name} users` : 'Room users';
    els.usersMeta.textContent = room ? `${st.username} • Room ID ${room.roomid} • ${room.users?.length || 0} users` : 'No room selected';
    els.usersList.innerHTML = room && room.users.length ? '' : '<div class="muted" style="font-size:12px">No users loaded yet.</div>';
    if (!room) return;
    for (const u of room.users) {
      const el = document.createElement('div');
      el.className = 'user-item';
      const av = document.createElement('div');
      av.className = 'avatar-wrap';
      av.appendChild(avatarNode(u.avatar));
      const main = document.createElement('div');
      main.className = 'user-card-main';
      main.innerHTML = `<div class="user-subrow"><div class="room-name">${escapeHtml(u.username || 'Unknown')}</div><div class="role-pill">${escapeHtml(u.role || 'user')}</div></div><div class="meta">User ID ${escapeHtml(u.userid)}</div>`;
      el.append(av, main);
      el.onclick = () => useUserTarget(u, false);
      el.ondblclick = () => { useUserTarget(u, true); showUsers(false); };
      els.usersList.appendChild(el);
    }
  }

  function renderMessages() {
    const st = activeState();
    const room = currentRoom();
    els.messages.innerHTML = room ? '' : '<div class="empty">Open a room from the room list.</div>';
    if (!room) return;
    if (!room.messages.length) {
      els.messages.innerHTML = `<div class="empty">${escapeHtml(st.username)} as ${escapeHtml(room.name)} open hai. Messages yahan appear honge.</div>`;
      return;
    }
    room.messages.forEach(m => {
      const wrap = document.createElement('div'); wrap.className = 'msg' + (m.mine ? ' mine' : '');
      const av = document.createElement('div'); av.className = 'avatar-wrap'; av.appendChild(avatarNode(m.avatar)); wrap.appendChild(av);
      const main = document.createElement('div'); main.className = 'msg-main';
      const head = document.createElement('div'); head.className = 'msg-head';
      head.innerHTML = `<span class="uname">${escapeHtml(m.username)}</span><button class="uid-chip" data-uid="${escapeHtml(m.userid)}">${escapeHtml(m.userid)}</button><span class="meta-chip">${escapeHtml(m.type)}${m.secret ? ' • secret' : ''}</span><span class="meta-chip">${m.ts.toLocaleTimeString()}</span>`;
      main.appendChild(head);
      const txt = document.createElement('div'); txt.className = 'msg-text'; txt.innerHTML = linkify(escapeHtml(m.text || '')); main.appendChild(txt);
      const media = mediaNode(m.media); if (media) main.appendChild(media);
      const actions = document.createElement('div'); actions.className = 'msg-actions';
      const secretBtn = document.createElement('button'); secretBtn.className = 'small-btn'; secretBtn.textContent = 'Send this as secret'; secretBtn.onclick = () => quickSecretFromMessage(m);
      const useBtn = document.createElement('button'); useBtn.className = 'small-btn'; useBtn.textContent = 'Use this ID'; useBtn.onclick = () => useUserTarget({ userid: m.userid, username: m.username }, true);
      actions.append(secretBtn, useBtn); main.appendChild(actions);
      wrap.appendChild(main);
      wrap.querySelector('.uid-chip').onclick = e => { e.stopPropagation(); handleUidTap(m); };
      wrap.ondblclick = () => useUserTarget({ userid: m.userid, username: m.username }, true);
      els.messages.appendChild(wrap);
    });
    els.messages.scrollTop = els.messages.scrollHeight;
    updateChatHeader();
  }

  function updateChatHeader() {
    const st = activeState();
    const room = currentRoom();
    if (!room) {
      els.chatRoomTitle.textContent = st ? `${st.username}: No room selected` : 'No room selected';
      els.chatRoomMeta.textContent = 'Go back and open a room from the room list';
      return;
    }
    els.chatRoomTitle.textContent = `${st.username} → ${room.name}`;
    els.chatRoomMeta.textContent = `Room ID ${room.roomid} • ${room.users?.length || 0} users • ${room.messages.length} messages`;
  }

  function handleUidTap(m) {
    const st = activeState();
    if (!st) return;
    if (st.lastUid === m.userid && Date.now() - st.lastUidAt < 350) {
      useUserTarget({ userid:m.userid, username:m.username }, true); st.lastUid = null; return;
    }
    st.lastUid = m.userid; st.lastUidAt = Date.now();
  }

  function useUserTarget(u, switchSecret = true) {
    els.targetUserId.value = u.userid || '';
    els.pmUser.value = u.username || '';
    els.pmUserId.value = u.userid || '';
    if (switchSecret) setMode('secret');
  }

  function quickSecretFromMessage(m) {
    useUserTarget({ userid:m.userid, username:m.username }, true);
    if ((els.messageInput.value || '') !== '') sendMessage();
    else els.messageInput.focus();
  }

  function ensureRoomListFresh(cb) {
    const st = activeState();
    if (!st) return;
    const fresh = Date.now() - st.roomListStamp < 30000 && st.roomList.length;
    if (fresh) return cb?.();
    refreshRoomList(true, st);
    let tries = 0;
    const t = setInterval(() => {
      tries += 1;
      if (st.roomList.length || tries >= 6) { clearInterval(t); cb?.(); }
    }, 350);
  }

  function refreshRoomList(silent = false, st = activeState()) {
    if (!st?.connected) { if (!silent) alert('Please log in first.'); return; }
    wsSend(st, { handler:'getchatrooms', admin:String(st.username || st.myName || '') });
  }
  function startRoomAutoRefresh(st) { stopRoomAutoRefresh(st); st.roomTimer = setInterval(() => st.connected && refreshRoomList(true, st), 25000); }
  function stopRoomAutoRefresh(st) { if (st?.roomTimer) clearInterval(st.roomTimer); if (st) st.roomTimer = null; }

  function joinRoomId(rid) {
    const st = activeState();
    rid = Number(rid || 0);
    if (!st || !rid) return;
    ensureRoom(st, rid, roomNameById(st, rid) || `Room ${rid}`);
    wsSend(st, { handler:'joinchatroom', roomid:rid });
  }
  function joinById() {
    const rid = Number((els.roomId.value || '').trim());
    if (!rid) return alert('Please enter a valid room ID.');
    joinRoomId(rid);
  }
  function joinByName() {
    const st = activeState();
    const q = normalizeRoomName((els.roomName.value || '').trim());
    if (!st) return alert('Please log in first.');
    if (!q) return alert('Please enter a room name.');
    ensureRoomListFresh(() => {
      const exact = st.roomList.find(r => normalizeRoomName(r.name) === q);
      const starts = st.roomList.find(r => normalizeRoomName(r.name).startsWith(q));
      const includes = st.roomList.find(r => normalizeRoomName(r.name).includes(q));
      const found = exact || starts || includes;
      if (!found) return alert('Room not found. Refresh the room list and try again.');
      els.roomId.value = found.roomid; els.roomName.value = found.name; joinRoomId(found.roomid);
    });
  }

  function refreshUsers(st = activeState()) { if (!st?.activeRoomId) return; wsSend(st, { handler:'getusers', roomid:st.activeRoomId }); }
  function leaveCurrentRoom() { const st = activeState(); const rid = st?.activeRoomId; if (!st || !rid) return; wsSend(st, { handler:'leavechatroom', roomid:rid }); removeRoom(st, rid); }
  function setMode(mode) { const st = activeState(); if (st) st.sendMode = mode; [[els.modeNormal,'normal'],[els.modeSecret,'secret'],[els.modePm,'pm']].forEach(([el,m]) => el.classList.toggle('active', m === mode)); }

  function selfEcho(st, { roomid, text, type, secret = false, userid = st.username }) {
    ensureRoom(st, roomid, roomNameById(st, roomid) || (roomid === -1 ? 'PM' : `Room ${roomid}`));
    const room = st.rooms.get(roomid);
    room.messages.push({ username:st.username, userid, avatar:'', text, url:'', media:(String(text).match(IMAGE_RE)?.[1] || ''), type, secret, mine:true, ts:new Date() });
    if (st.activeRoomId !== roomid) room.unread = (room.unread || 0) + 1;
    if (app.activeKey === st.key) { renderJoinedRooms(); renderTabs(); if (st.activeRoomId === roomid) renderMessages(); }
  }
  function ensurePmRoom(st) { const rid = -1; ensureRoom(st, rid,'PM'); st.activeRoomId = rid; if (app.activeKey === st.key) activateRoom(rid,true); return rid; }

  function sendMessage() {
    const st = activeState();
    const text = els.messageInput.value;
    const rid = st?.activeRoomId;
    if (!st?.loggedIn) return alert('Please log in first.');
    if (!rid && st.sendMode !== 'pm') return alert('Please join a room first.');
    if (!String(text || '').trim()) return;
    let ok = false;
    if (st.sendMode === 'normal') ok = wsSend(st, { handler:'chatroommessage', roomid:rid, text, type:'text' });
    else if (st.sendMode === 'secret') {
      const uid = Number((els.targetUserId.value || '').trim() || 0);
      if (!uid) return alert('Please enter a target user ID for secret mode.');
      ok = wsSend(st, { handler:'chatroommessage', roomid:rid, userid:uid, secret:true, text, type:'text' });
      if (ok) selfEcho(st, { roomid:rid, text, type:'text', secret:true, userid:`${st.username} → ${uid}` });
    } else {
      const to = (els.pmUser.value || '').trim(); const uid = Number((els.pmUserId.value || '').trim() || 0);
      if (!to || !uid) return alert('Please enter both PM username and user ID.');
      ok = wsSend(st, { handler:'message', to, userid:uid, text, type:'text' });
      if (ok) selfEcho(st, { roomid:rid || ensurePmRoom(st), text, type:'pm', userid:uid });
    }
    if (ok) { els.messageInput.value = ''; autoGrowTextarea(); }
  }

  const EMOJIS = ["😀","😂","😍","🥰","😎","😭","🔥","❤️","👍","🙏","😉","🤝","🎉","😇","😅","😡","💙","🧡","💯","✨","🌸","🎵","😴","🥳"];
  function initEmojiPanel() {
    els.emojiPanel.innerHTML = '';
    EMOJIS.forEach(e => {
      const b = document.createElement('button');
      b.className = 'emoji-chip';
      b.type = 'button';
      b.textContent = e;
      b.onclick = () => insertEmoji(e);
      els.emojiPanel.appendChild(b);
    });
  }
  function toggleEmojiPanel(force) {
    const show = typeof force === 'boolean' ? force : !els.emojiPanel.classList.contains('show');
    els.emojiPanel.classList.toggle('show', show);
  }
  function insertEmoji(e) {
    const t = els.messageInput;
    const start = t.selectionStart ?? t.value.length;
    const end = t.selectionEnd ?? t.value.length;
    t.value = t.value.slice(0, start) + e + t.value.slice(end);
    t.focus();
    t.selectionStart = t.selectionEnd = start + e.length;
    autoGrowTextarea();
  }

  function autoGrowTextarea() { const t = els.messageInput; t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 140) + 'px'; }
  function showUsers(show) { els.usersSheet.classList.toggle('show', !!show); if (show) renderUsers(); }

  injectMultiIdUi();

  els.loginBtn.onclick = connectAndLogin;
  els.disconnectBtn.onclick = () => {
    for (const st of app.accounts.values()) {
      st.desiredOnline = false;
      if (st.reconnectTimer) clearTimeout(st.reconnectTimer);
      st.reconnectTimer = null;
      stopHeartbeat(st);
      stopRoomAutoRefresh(st);
      try { st.ws?.close(); } catch {}
    }
    setStatus('offline', 'Offline');
    showScreen('loginScreen');
  };
  els.refreshRoomsBtn.onclick = () => refreshRoomList();
  els.joinByIdBtn.onclick = joinById;
  els.joinByNameBtn.onclick = joinByName;
  els.roomSearch.addEventListener('input', renderRoomDirectory);
  els.backToLobbyBtn.onclick = () => showScreen('lobbyScreen');
  els.addRoomBtn.onclick = () => showScreen('lobbyScreen');
  els.usersBtn.onclick = () => { refreshUsers(); showUsers(true); };
  els.closeUsersBtn.onclick = () => showUsers(false);
  els.usersSheet.addEventListener('click', e => { if (e.target === els.usersSheet) showUsers(false); });
  els.refreshUsersBtn.onclick = () => refreshUsers();
  els.leaveBtn.onclick = leaveCurrentRoom;
  els.modeNormal.onclick = () => setMode('normal');
  els.modeSecret.onclick = () => setMode('secret');
  els.modePm.onclick = () => setMode('pm');
  els.emojiBtn.onclick = () => toggleEmojiPanel();
  els.sendBtn.onclick = sendMessage;
  els.messageInput.addEventListener('input', autoGrowTextarea);
  els.messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.addEventListener('click', e => { if (!e.target.closest('.compose-wrap')) toggleEmojiPanel(false); });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      requestWakeLock();
      for (const st of app.accounts.values()) {
        if (!st.desiredOnline) continue;
        if (!st.ws || st.ws.readyState !== WebSocket.OPEN) {
          scheduleReconnect(st, 'app visible again');
        } else {
          wsSend(st, { handler:'ping', t:Date.now(), client:'arya-html-visible' });
          if (st.loggedIn) {
            refreshRoomList(true, st);
            refreshUsers(st);
          }
        }
      }
    }
  });

  window.addEventListener('focus', () => {
    requestWakeLock();
    for (const st of app.accounts.values()) {
      if (st.desiredOnline && (!st.ws || st.ws.readyState !== WebSocket.OPEN)) scheduleReconnect(st, 'window focus');
    }
  });

  window.addEventListener('online', () => {
    for (const st of app.accounts.values()) {
      if (st.desiredOnline) scheduleReconnect(st, 'network online');
    }
  });

  window.addEventListener('offline', () => {
    setStatus('offline', 'Network offline');
  });

  initEmojiPanel();
  renderJoinedRooms(); renderRoomDirectory(); renderTabs(); renderMessages(); renderUsers(); updateChatHeader(); autoGrowTextarea(); syncStatus(); requestWakeLock();
})();
</script>
</body>
</html>
